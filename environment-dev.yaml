name: panseg-dev
channels:
  - conda-forge
dependencies:
  - python>=3.11
  - pip
  # Neural Network and GPU
  - pytorch=2.9.1
  - tensorboard=2.20.0
  # Bioimage and CV
  - tifffile=2025.12.12
  - h5py=3.15.1
  - zarr=3.1.5
  - vigra=1.12.2
  - python-elf=0.7.4
  - python-graphviz=0.21
  - scikit-image=0.25.2
  - bioimageio.core=0.9.5
  - bioimageio.spec=0.5.6.0
  # GUI
  - qtpy=2.4.3
  - pyside6=6.10.1
  - napari=0.6.6
  - qt-material=2.14
  # Other
  - requests=2.32.5
  - pyyaml=6.0.3
  - pydantic=2.11.10
  - trimesh=4.11.0
  - zmesh=1.8.0
  # Test
  - pytest
  - pytest-cov
  - pytest-qt
  - pytest-mock
  - requests-mock
  # CI/CD
  - pre-commit
  - bump-my-version
  # Docs
  - mkdocs-material
  - mkdocs-autorefs
  - mkdocs-git-revision-date-localized-plugin
  - mkdocs-git-committers-plugin-2
  - mkdocstrings-python
  - mike
  - pip:
      - markdown-exec
      - -e .
